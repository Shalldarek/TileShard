services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: tiles
      POSTGRES_USER: tiles
      POSTGRES_PASSWORD: tiles
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tiles -d tiles"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://tiles:tiles@db:5432/tiles
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata: